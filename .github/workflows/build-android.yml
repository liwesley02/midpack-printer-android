name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Verify Brother SDK
      run: |
        echo "Checking for Brother SDK AAR file..."
        ls -lh android/app/libs/BrotherPrintLibrary.aar
        echo "✓ Brother SDK found"

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build with Gradle
      run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: midpack2-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
