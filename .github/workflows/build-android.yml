name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build web assets
      run: npm run build

    - name: Sync to Android
      run: npx cap sync android

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Verify Brother SDK AAR
      run: ls -lh android/app/libs/BrotherPrintLibrary.aar

    - name: Build APK
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew clean assembleDebug --stacktrace --info

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Generate release tag
      id: tag
      run: |
        echo "release_tag=v$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

    - name: Rename APK for release
      run: |
        cp android/app/build/outputs/apk/debug/app-debug.apk ./midpack-printer.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: Android Build ${{ steps.tag.outputs.release_tag }}
        body: |
          Automated Android APK build

          **Installation:**
          1. Download `midpack-printer.apk` below
          2. Transfer to tablet via USB or cloud storage
          3. Enable "Install from unknown sources" in tablet settings
          4. Tap the APK file to install

          **Build Info:**
          - Commit: ${{ github.sha }}
          - Built: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        files: |
          midpack-printer.apk
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
